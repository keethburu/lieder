<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="dark light">
    <title>Lieder Philadelphia / 30.5.26</title>
    <script>
        (() => {
            const savedTheme = localStorage.getItem('theme-preference');
            if (savedTheme === 'dark' || savedTheme === 'light') {
                document.documentElement.dataset.theme = savedTheme;
            }
        })();
    </script>
    <style>
        :root {
            --bg-color: #f4efe7;
            --surface-color: #fffaf2;
            --surface-accent: #efe4d2;
            --text-main: #2b241d;
            --text-muted: #6d6255;
            --accent-color: #b8641d;
            --font-size-lyrics: 1.2rem;
            --border-color: #d7c7b4;
            --overlay-bg: rgba(255, 250, 242, 0.92);
            --shadow-color: rgba(75, 55, 30, 0.18);
            --control-bg: #e9dccb;
            --control-active-bg: #b8641d;
            --control-active-text: #fffaf2;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --surface-color: #1e1e1e;
                --surface-accent: #2a2a2a;
                --text-main: #e0e0e0;
                --text-muted: #a0a0a0;
                --accent-color: #ffb74d;
                --border-color: #3d3d3d;
                --overlay-bg: rgba(30, 30, 30, 0.95);
                --shadow-color: rgba(0, 0, 0, 0.6);
                --control-bg: #2a2a2a;
                --control-active-bg: #ffb74d;
                --control-active-text: #1a1a1a;
            }
        }

        :root[data-theme='light'] {
            --bg-color: #f4efe7;
            --surface-color: #fffaf2;
            --surface-accent: #efe4d2;
            --text-main: #2b241d;
            --text-muted: #6d6255;
            --accent-color: #b8641d;
            --border-color: #d7c7b4;
            --overlay-bg: rgba(255, 250, 242, 0.92);
            --shadow-color: rgba(75, 55, 30, 0.18);
            --control-bg: #e9dccb;
            --control-active-bg: #b8641d;
            --control-active-text: #fffaf2;
        }

        :root[data-theme='dark'] {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --surface-accent: #2a2a2a;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent-color: #ffb74d;
            --border-color: #3d3d3d;
            --overlay-bg: rgba(30, 30, 30, 0.95);
            --shadow-color: rgba(0, 0, 0, 0.6);
            --control-bg: #2a2a2a;
            --control-active-bg: #ffb74d;
            --control-active-text: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding-bottom: 90px;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        header {
            background-color: var(--surface-color);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        h1 {
            font-size: 1.3rem;
            color: var(--accent-color);
            margin-bottom: 8px;
        }

        .search-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 10px 15px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--accent-color);
        }

        .toolbar-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .theme-switcher {
            position: relative;
        }

        .theme-toggle {
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-muted);
            font-size: 1rem;
            border-radius: 999px;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .theme-toggle:hover,
        .theme-toggle:focus-visible,
        .theme-switcher.open .theme-toggle {
            background: var(--control-bg);
            color: var(--text-main);
            outline: none;
        }

        .theme-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            min-width: 122px;
            display: none;
            flex-direction: column;
            gap: 4px;
            padding: 6px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            box-shadow: 0 8px 24px var(--shadow-color);
            z-index: 250;
        }

        .theme-switcher.open .theme-menu {
            display: flex;
        }

        .theme-btn {
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.84rem;
            padding: 8px 10px;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .theme-btn.active {
            background: var(--control-active-bg);
            color: var(--control-active-text);
        }

        main {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
        }

        .category-block {
            margin-bottom: 20px;
        }

        .category-title {
            font-size: 1.1rem;
            color: var(--accent-color);
            margin: 15px 0 10px 0;
            padding-left: 5px;
            border-left: 3px solid var(--accent-color);
        }

        /* Song-Button im Verzeichnis */
        .song-trigger {
            width: 100%;
            background-color: var(--surface-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            text-align: left;
            font-size: 1.05rem;
            font-weight: 500;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .song-trigger:active {
            background-color: var(--surface-accent);
        }

        .song-trigger .artist {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: block;
            font-weight: normal;
            margin-top: 2px;
        }

        .song-wrapper {
            scroll-margin-top: 84px;
        }

        .load-message {
            color: var(--text-muted);
            text-align: center;
            padding: 28px 0;
        }

        /* Song-Inhalt-Container */
        .song-content {
            display: none;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 8px 8px;
            margin-top: -12px;
            margin-bottom: 12px;
            padding: 20px 15px;
            animation: fadeIn 0.2s ease-out;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .song-content.active {
            display: block;
        }

        .song-content h2 {
            font-size: 1.25rem;
            color: var(--accent-color);
            margin-bottom: 2px;
        }

        .song-content .song-artist {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-style: italic;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        /* Songtexte Formatierung */
        .lyrics {
            font-size: var(--font-size-lyrics);
            white-space: pre-line;
            letter-spacing: 0.2px;
        }

        .lyrics br {
            content: "";
            margin: 0.5em 0;
            display: block;
        }

        /* Fixed Action Bar unten */
        .action-bar {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--overlay-bg);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 20px;
            box-shadow: 0 4px 25px var(--shadow-color);
            z-index: 200;
            border: 1px solid var(--border-color);
            transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: bold;
            padding: 5px 10px;
            cursor: pointer;
        }

        .action-btn:active {
            color: var(--accent-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ansicht bei aktiver Suche */
        .searching .category-title {
            display: none;
        }
        .searching .song-trigger {
            margin-top: 5px;
        }

        @media (max-width: 560px) {
            .toolbar-row {
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Lieder Philadelphia / 30.5.26</h1>
        <div class="toolbar-row">
            <div class="theme-switcher" id="themeSwitcher">
                <button type="button" class="theme-toggle" id="themeToggle" aria-label="Farbschema öffnen" aria-haspopup="true" aria-expanded="false" aria-controls="themeMenu" onclick="toggleThemeMenu()">
                    <span id="themeToggleIcon" aria-hidden="true">◐</span>
                </button>
                <div class="theme-menu" id="themeMenu" role="menu" aria-label="Farbschema auswählen">
                    <button type="button" class="theme-btn" data-theme-option="system" onclick="setThemePreference('system')">System</button>
                    <button type="button" class="theme-btn" data-theme-option="light" onclick="setThemePreference('light')">Hell</button>
                    <button type="button" class="theme-btn" data-theme-option="dark" onclick="setThemePreference('dark')">Dunkel</button>
                </div>
            </div>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Lied oder Interpret suchen..." oninput="searchSongs()">
        </div>
    </header>

    <main id="mainList" aria-live="polite"></main>

    <!-- Steuerungsleiste unten für Einhand-Bedienung -->
    <div class="action-bar">
        <button class="action-btn" onclick="adjustFont(-0.1)">A−</button>
        <button class="action-btn" onclick="adjustFont(0.1)">A+</button>
        <button class="action-btn" onclick="closeAllSongs()">Alles zu</button>
        <button class="action-btn" onclick="scrollToTop()">⬆ Oben</button>
    </div>

    <script>
        const themeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        const themeSwitcher = document.getElementById('themeSwitcher');
        const themeToggle = document.getElementById('themeToggle');
        const themeToggleIcon = document.getElementById('themeToggleIcon');
        const mainList = document.getElementById('mainList');
        const searchInput = document.getElementById('searchInput');
        const songMarkdownCache = new Map();
        const themeNames = {
            system: 'System',
            light: 'Hell',
            dark: 'Dunkel'
        };
        const themeIcons = {
            system: '◐',
            light: '☼',
            dark: '☾'
        };
        let currentSize = 1.2;

        function getStoredThemePreference() {
            return localStorage.getItem('theme-preference') || 'system';
        }

        function setThemeMenuOpen(isOpen) {
            themeSwitcher.classList.toggle('open', isOpen);
            themeToggle.setAttribute('aria-expanded', String(isOpen));
        }

        function toggleThemeMenu() {
            setThemeMenuOpen(!themeSwitcher.classList.contains('open'));
        }

        function applyTheme(theme) {
            if (theme === 'dark' || theme === 'light') {
                document.documentElement.dataset.theme = theme;
            } else {
                delete document.documentElement.dataset.theme;
            }

            const themeName = themeNames[theme] || themeNames.system;
            themeToggleIcon.textContent = themeIcons[theme] || themeIcons.system;
            themeToggle.setAttribute('title', 'Farbschema: ' + themeName);
            themeToggle.setAttribute('aria-label', 'Farbschema: ' + themeName + '. Auswahl öffnen');

            document.querySelectorAll('.theme-btn').forEach(button => {
                const isActive = button.dataset.themeOption === theme;
                button.classList.toggle('active', isActive);
                button.setAttribute('aria-pressed', String(isActive));
            });
        }

        function setThemePreference(theme) {
            localStorage.setItem('theme-preference', theme);
            applyTheme(theme);
            setThemeMenuOpen(false);
        }

        function normalizeSearchText(value) {
            return (value || '')
                .toLowerCase()
                .normalize('NFD')
                .replace(/[̀-ͯ]/g, '');
        }

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, character => {
                const entities = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;'
                };
                return entities[character];
            });
        }

        function renderLyricsMarkdown(markdown) {
            return escapeHtml(markdown).replace(/\*\*(.+?)\*\*/gs, '<strong>$1</strong>');
        }

        function setMainListMessage(message) {
            mainList.innerHTML = '<p class="load-message">' + escapeHtml(message) + '</p>';
        }

        function clearSongHash() {
            history.replaceState(null, '', window.location.pathname + window.location.search);
        }

        function setSongHash(songId) {
            history.replaceState(null, '', '#' + songId);
        }

        function setSongState(button, isOpen, options = {}) {
            const { updateHash = true, scroll = false } = options;
            const wrapper = button.closest('.song-wrapper');
            const content = button.nextElementSibling;
            const arrow = button.lastElementChild;

            content.classList.toggle('active', isOpen);
            button.setAttribute('aria-expanded', String(isOpen));
            arrow.textContent = isOpen ? '▲' : '▼';

            if (updateHash) {
                if (isOpen) {
                    setSongHash(wrapper.id);
                } else if (window.location.hash === '#' + wrapper.id) {
                    clearSongHash();
                }
            }

            if (isOpen && scroll) {
                setTimeout(() => {
                    wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 150);
            }
        }

        function applyLyricsFontSize(root = document) {
            root.querySelectorAll('.lyrics').forEach(element => {
                element.style.fontSize = currentSize + 'rem';
            });
        }

        function createSongWrapper(song) {
            const wrapper = document.createElement('div');
            wrapper.className = 'song-wrapper';
            wrapper.id = song.slug;
            wrapper.dataset.src = song.src;
            wrapper.dataset.loaded = 'false';
            wrapper.dataset.searchText = normalizeSearchText([
                song.title,
                song.listTitle,
                song.artist,
                song.listArtist,
                song.searchArtist
            ].filter(Boolean).join(' '));

            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'song-trigger';
            button.setAttribute('aria-controls', song.slug + '-content');
            button.setAttribute('aria-expanded', 'false');
            button.innerHTML =
                '<div>' +
                escapeHtml(song.listTitle || song.title) +
                '<span class="artist">' +
                escapeHtml(song.listArtist || song.artist) +
                '</span></div><span>▼</span>';
            button.addEventListener('click', () => {
                void toggleSong(button);
            });

            const content = document.createElement('div');
            content.className = 'song-content';
            content.id = song.slug + '-content';
            content.innerHTML =
                '<h2>' + escapeHtml(song.title) + '</h2>' +
                '<div class="song-artist">' + escapeHtml(song.artist) + '</div>' +
                '<div class="lyrics">Liedtext wird geladen ...</div>';

            wrapper.append(button, content);
            return wrapper;
        }

        function renderCatalog(catalog) {
            const fragment = document.createDocumentFragment();

            catalog.sections.forEach(section => {
                const block = document.createElement('div');
                block.className = 'category-block';
                block.dataset.sectionId = section.id;

                const title = document.createElement('div');
                title.className = 'category-title';
                title.textContent = section.title;
                block.append(title);

                section.songs.forEach(song => {
                    block.append(createSongWrapper(song));
                });

                fragment.append(block);
            });

            mainList.replaceChildren(fragment);
            applyLyricsFontSize(mainList);
        }

        async function loadCatalog() {
            const response = await fetch('content/catalog.json', { cache: 'no-cache' });
            if (!response.ok) {
                throw new Error('Catalog request failed with status ' + response.status);
            }
            return response.json();
        }

        async function getSongMarkdown(src) {
            if (!songMarkdownCache.has(src)) {
                const request = fetch(src, { cache: 'no-cache' })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Song request failed with status ' + response.status);
                        }
                        return response.text();
                    })
                    .catch(error => {
                        songMarkdownCache.delete(src);
                        throw error;
                    });
                songMarkdownCache.set(src, request);
            }

            return songMarkdownCache.get(src);
        }

        async function ensureSongLoaded(wrapper) {
            if (!wrapper || wrapper.dataset.loaded === 'true') {
                return;
            }

            const lyrics = wrapper.querySelector('.lyrics');
            lyrics.textContent = 'Liedtext wird geladen ...';

            try {
                const markdown = await getSongMarkdown(wrapper.dataset.src);
                lyrics.innerHTML = renderLyricsMarkdown(markdown);
                wrapper.dataset.loaded = 'true';
                applyLyricsFontSize(wrapper);
            } catch (error) {
                wrapper.dataset.loaded = 'error';
                lyrics.textContent = 'Liedtext konnte nicht geladen werden.';
                console.error('Song load failed for ' + wrapper.dataset.src, error);
            }
        }

        async function openSongFromHash() {
            const songId = decodeURIComponent(window.location.hash.slice(1));
            if (!songId) {
                return;
            }

            const wrapper = document.getElementById(songId);
            if (!wrapper) {
                return;
            }

            const section = wrapper.closest('.category-block');
            if (section) {
                section.style.display = 'block';
            }
            wrapper.style.display = 'block';

            const button = wrapper.querySelector('.song-trigger');
            if (!button.nextElementSibling.classList.contains('active')) {
                setSongState(button, true, { updateHash: false, scroll: true });
            }

            await ensureSongLoaded(wrapper);
        }

        async function initSongCatalog() {
            searchInput.disabled = true;
            setMainListMessage('Lieder werden geladen ...');

            try {
                const catalog = await loadCatalog();
                renderCatalog(catalog);
                searchInput.disabled = false;

                if (searchInput.value.trim()) {
                    searchSongs();
                }

                await openSongFromHash();
            } catch (error) {
                searchInput.disabled = false;
                setMainListMessage('Lieder konnten nicht geladen werden.');
                console.error('Catalog load failed', error);
            }
        }

        themeMediaQuery.addEventListener('change', () => {
            if (getStoredThemePreference() === 'system') {
                applyTheme('system');
            }
        });

        document.addEventListener('click', event => {
            if (!themeSwitcher.contains(event.target)) {
                setThemeMenuOpen(false);
            }
        });

        document.addEventListener('keydown', event => {
            if (event.key === 'Escape') {
                setThemeMenuOpen(false);
            }
        });

        applyTheme(getStoredThemePreference());
        window.addEventListener('hashchange', () => {
            void openSongFromHash();
        });
        void initSongCatalog();

        async function toggleSong(button) {
            const content = button.nextElementSibling;
            const shouldOpen = !content.classList.contains('active');
            setSongState(button, shouldOpen, { updateHash: true, scroll: shouldOpen });

            if (shouldOpen) {
                await ensureSongLoaded(button.closest('.song-wrapper'));
            }
        }

        function closeAllSongs() {
            document.querySelectorAll('.song-trigger').forEach(button => {
                setSongState(button, false, { updateHash: false, scroll: false });
            });
            clearSongHash();
        }

        function searchSongs() {
            const query = normalizeSearchText(searchInput.value.trim());
            const sections = document.querySelectorAll('.category-block');

            if (query === '') {
                mainList.classList.remove('searching');
                sections.forEach(section => {
                    section.style.display = 'block';
                    section.querySelectorAll('.song-wrapper').forEach(wrapper => {
                        wrapper.style.display = 'block';
                    });
                });
                return;
            }

            mainList.classList.add('searching');

            sections.forEach(section => {
                let hasMatch = false;

                section.querySelectorAll('.song-wrapper').forEach(wrapper => {
                    const matches = wrapper.dataset.searchText.includes(query);
                    wrapper.style.display = matches ? 'block' : 'none';

                    if (matches) {
                        hasMatch = true;
                    } else {
                        setSongState(wrapper.querySelector('.song-trigger'), false, { updateHash: false, scroll: false });
                        if (window.location.hash === '#' + wrapper.id) {
                            clearSongHash();
                        }
                    }
                });

                section.style.display = hasMatch ? 'block' : 'none';
            });
        }

        function adjustFont(step) {
            currentSize += step;
            if (currentSize < 0.9) currentSize = 0.9;
            if (currentSize > 2.0) currentSize = 2.0;
            applyLyricsFontSize();
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
